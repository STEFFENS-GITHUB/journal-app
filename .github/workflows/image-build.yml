name: Journal App Image Build
on:
  push:
    branches:
    - main
jobs:
  testing:
    runs-on: ubuntu-latest
    env:
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      DEFAULT_APP_PASSWORD: ${{ secrets.DEFAULT_APP_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DOCKER_ENV: ${{ secrets.DOCKER_ENV }}
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v6
    - name: Install python to runner
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install app dependancies
      run: pip install -r app/requirements.txt
    - name: Run docker compose
      run: docker compose -f docker-compose.ci.yaml up -d mysql
    - name: Run journal app
      run: python -m app.init_db
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_LOCAL }}
    - name: Run unit tests
      run: pytest app
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_LOCAL }}

  build-and-push:
    needs: testing
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v4
    - name: Login to Dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKERHUB_USER}}
        password: ${{secrets.DOCKERHUB_PAT}}
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: ./
        file: ./Dockerfile
        push: true
        tags: |
          steffenp123/journal-app:1.${{ github.run_number }}
          steffenp123/journal-app:latest